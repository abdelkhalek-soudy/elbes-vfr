<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول | البس</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>

    <header class="site">
        <div class="container">
            <div class="brand">البس<span>غرفة القياس الافتراضية</span></div>
            <nav class="site-nav">
                <a href="/">الرئيسية</a>
                <a href="/measure.html">احسب مقاسك</a>
                <a href="/track.html">تتبّع طلبك</a>
            </nav>
            <div class="nav-auth-links">
                <a href="/login.html" class="login-link" style="background:var(--accent-glow);">دخول</a>
                <a href="/signup.html" class="signup-link">حساب جديد</a>
            </div>
        </div>
    </header>

    <div class="auth-page">
        <div class="auth-card">
            <div class="card">
                <h2>تسجيل الدخول</h2>
                <div class="auth-sub">ادخل بيانات حسابك عشان تكمّل</div>

                <div id="errorBox" class="error-box"></div>

                <form id="loginForm">
                    <div class="field">
                        <label>البريد الإلكتروني</label>
                        <input type="email" id="email" placeholder="example@mail.com" required style="direction:ltr;" />
                    </div>
                    <div class="field">
                        <label>كلمة السر</label>
                        <input type="password" id="password" placeholder="••••••••" required />
                    </div>
                    <button type="submit" class="btn btn-gold btn-block" id="loginBtn">دخول</button>
                </form>

                <div class="auth-footer">
                    مش عندك حساب؟ <a href="/signup.html">سجّل دلوقتي</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="site">
        <div class="container">© البس — غرفة القياس الافتراضية</div>
    </footer>

    <script>
        (function () {
            document.getElementById('loginForm').addEventListener('submit', async function (e) {
                e.preventDefault();
                const errBox = document.getElementById('errorBox');
                errBox.classList.remove('show');
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                if (!email || !password) {
                    errBox.textContent = 'الإيميل وكلمة السر مطلوبين';
                    errBox.classList.add('show');
                    return;
                }
                const btn = document.getElementById('loginBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span>';
                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        errBox.textContent = data.error || 'فشل تسجيل الدخول';
                        errBox.classList.add('show');
                        btn.disabled = false;
                        btn.textContent = 'دخول';
                        return;
                    }
                    // Redirect back or to home
                    const params = new URLSearchParams(window.location.search);
                    const redirect = params.get('redirect') || '/';
                    window.location.href = redirect;
                } catch (err) {
                    errBox.textContent = 'تعذر الاتصال بالسيرفر';
                    errBox.classList.add('show');
                    btn.disabled = false;
                    btn.textContent = 'دخول';
                }
            });
        })();
    </script>
</body>

</html>
