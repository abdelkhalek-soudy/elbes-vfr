<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة التحكم | البس</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>

    <header class="site">
        <div class="container">
            <div class="brand">البس<span>لوحة تحكم الأدمن</span></div>
            <nav class="site-nav">
                <a href="/">الرئيسية</a>
                <a href="/admin.html" class="active">لوحة التحكم</a>
            </nav>
            <div id="navUserArea" class="nav-user">
                <a href="#" id="logoutLink" style="font-size:13px; color:var(--accent);">خروج</a>
            </div>
        </div>
    </header>

    <section class="section">
        <div class="container" style="max-width:1100px;">

            <div id="accessDenied" style="display:none; text-align:center; padding:60px 0;">
                <p style="color:var(--danger); font-size:18px; margin-bottom:16px;">⛔ غير مصرّح لك بالدخول</p>
                <a href="/login.html" class="btn btn-outline">تسجيل الدخول</a>
            </div>

            <div id="adminContent" style="display:none;">
                <div class="admin-header">
                    <div class="section-title">إدارة الطلبات</div>
                    <button class="btn btn-outline btn-sm" id="refreshBtn">🔄 تحديث</button>
                </div>

                <div class="stat-cards" id="statCards">
                    <div class="stat-card">
                        <div class="stat-value" id="statTotal">0</div>
                        <div class="stat-label">إجمالي الطلبات</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statDraft">0</div>
                        <div class="stat-label">مسودة</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statConfirmed">0</div>
                        <div class="stat-label">مؤكّد</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statProgress">0</div>
                        <div class="stat-label">تحت التنفيذ</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statReady">0</div>
                        <div class="stat-label">جاهز</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statDelivered">0</div>
                        <div class="stat-label">تم التسليم</div>
                    </div>
                </div>

                <div class="card" style="overflow-x:auto; padding:16px;">
                    <table class="orders-table">
                        <thead>
                            <tr>
                                <th>كود التتبع</th>
                                <th>الاسم</th>
                                <th>الهاتف</th>
                                <th>المقاس</th>
                                <th>الثقة</th>
                                <th>الجنس</th>
                                <th>الحالة</th>
                                <th>تغيير الحالة</th>
                                <th>التاريخ</th>
                            </tr>
                        </thead>
                        <tbody id="ordersBody"></tbody>
                    </table>
                    <div id="emptyMsg" style="text-align:center; padding:30px; color:var(--text-muted); display:none;">
                        مفيش طلبات لسه</div>
                </div>
            </div>

        </div>
    </section>

    <footer class="site">
        <div class="container">© البس — لوحة تحكم الأدمن</div>
    </footer>

    <script>
        (function () {
            const STATUS_LABELS = { draft: 'مسودة', confirmed: 'مؤكّد', in_progress: 'تحت التنفيذ', ready: 'جاهز', delivered: 'تم التسليم' };
            const STATUS_LIST = ['draft', 'confirmed', 'in_progress', 'ready', 'delivered'];

            document.getElementById('logoutLink').addEventListener('click', e => {
                e.preventDefault();
                fetch('/api/auth/logout', { method: 'POST' }).then(() => location.href = '/');
            });

            async function init() {
                try {
                    const meRes = await fetch('/api/auth/me');
                    const me = await meRes.json();
                    if (!me.user || me.user.role !== 'admin') {
                        document.getElementById('accessDenied').style.display = 'block';
                        return;
                    }
                    document.getElementById('adminContent').style.display = 'block';
                    loadOrders();
                } catch (e) {
                    document.getElementById('accessDenied').style.display = 'block';
                }
            }

            async function loadOrders() {
                try {
                    const res = await fetch('/api/admin/orders');
                    if (!res.ok) { document.getElementById('accessDenied').style.display = 'block'; return; }
                    const orders = await res.json();
                    renderStats(orders);
                    renderTable(orders);
                } catch (e) {
                    console.error(e);
                }
            }

            function renderStats(orders) {
                document.getElementById('statTotal').textContent = orders.length;
                document.getElementById('statDraft').textContent = orders.filter(o => o.status === 'draft').length;
                document.getElementById('statConfirmed').textContent = orders.filter(o => o.status === 'confirmed').length;
                document.getElementById('statProgress').textContent = orders.filter(o => o.status === 'in_progress').length;
                document.getElementById('statReady').textContent = orders.filter(o => o.status === 'ready').length;
                document.getElementById('statDelivered').textContent = orders.filter(o => o.status === 'delivered').length;
            }

            function renderTable(orders) {
                const tbody = document.getElementById('ordersBody');
                const emptyMsg = document.getElementById('emptyMsg');
                if (orders.length === 0) { tbody.innerHTML = ''; emptyMsg.style.display = 'block'; return; }
                emptyMsg.style.display = 'none';
                tbody.innerHTML = orders.map(o => {
                    const date = new Date(o.created_at).toLocaleDateString('ar-EG', { year: 'numeric', month: 'short', day: 'numeric' });
                    const options = STATUS_LIST.map(s => `<option value="${s}" ${o.status === s ? 'selected' : ''}>${STATUS_LABELS[s]}</option>`).join('');
                    return `<tr>
        <td style="direction:ltr; font-weight:700; color:var(--accent-light); letter-spacing:1px;">${o.tracking_code}</td>
        <td>${o.name || '—'}</td>
        <td style="direction:ltr;">${o.phone || '—'}</td>
        <td style="font-weight:700;">${o.size}</td>
        <td>${o.confidence}%</td>
        <td>${o.gender === 'female' ? 'حريمي' : 'رجالي'}</td>
        <td><span class="status-pill status-${o.status}">${STATUS_LABELS[o.status] || o.status}</span></td>
        <td><select data-code="${o.tracking_code}" class="status-select">${options}</select></td>
        <td style="font-size:12px; color:var(--text-muted); white-space:nowrap;">${date}</td>
      </tr>`;
                }).join('');

                tbody.querySelectorAll('.status-select').forEach(sel => {
                    sel.addEventListener('change', async function () {
                        const code = this.dataset.code;
                        const status = this.value;
                        try {
                            await fetch('/api/admin/orders/' + encodeURIComponent(code) + '/status', {
                                method: 'PATCH',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ status })
                            });
                            loadOrders();
                        } catch (e) { console.error(e); }
                    });
                });
            }

            document.getElementById('refreshBtn').addEventListener('click', loadOrders);
            init();
        })();
    </script>
</body>

</html>
